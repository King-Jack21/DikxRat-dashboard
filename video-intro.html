<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DikxRat C2 - Intro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        video { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; }
        .skip-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 51, 51, 0.6);
            color: #FF3333;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            cursor: pointer;
            transition: all 0.2s;
        }
        .skip-btn:hover { background: rgba(255, 51, 51, 0.2); border-color: #FF3333; transform: scale(1.02); }
        .timer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            color: #FF6666;
            font-family: monospace;
            z-index: 100;
        }
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            visibility: hidden;
        }
        .error-card {
            background: #1a0a0a;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 51, 51, 0.4);
            max-width: 280px;
        }
        .error-card i { font-size: 48px; color: #FF3333; margin-bottom: 16px; display: block; }
        .error-card p { color: #fff; margin-bottom: 20px; }
        .error-card button {
            background: #FF3333;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <video id="introVideo" autoplay playsinline>
            <source src="https://files.catbox.moe/m0dur3.mp4" type="video/mp4">
        </video>
    </div>
    <div class="skip-btn" onclick="skipVideo()">⏩ SKIP</div>
    <div class="timer" id="timer">Loading video...</div>
    <div id="errorOverlay" class="error-overlay">
        <div class="error-card">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Gagal memuat video intro.<br>Lanjut ke dashboard?</p>
            <button onclick="goToDashboard()">LANJUTKAN</button>
        </div>
    </div>
    <script>
        const video = document.getElementById('introVideo');
        const timerEl = document.getElementById('timer');
        function goToDashboard() { window.location.href = 'dashboard.html'; }
        function skipVideo() { if(video) video.pause(); goToDashboard(); }
        video.addEventListener('ended', function() { goToDashboard(); });
        video.addEventListener('loadedmetadata', function() {
            const duration = video.duration;
            if(isFinite(duration)) {
                const minutes = Math.floor(duration / 60);
                const seconds = Math.floor(duration % 60);
                timerEl.textContent = `⏱️ ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        });
        video.addEventListener('error', function() {
            timerEl.textContent = '⚠️ Gagal memuat video';
            document.getElementById('errorOverlay').style.visibility = 'visible';
        });
        setTimeout(() => { if(video.readyState === 0) document.getElementById('errorOverlay').style.visibility = 'visible'; }, 5000);
    </script>
</body>
</html>
